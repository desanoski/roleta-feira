<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b1026" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<title>Roleta Alfa</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body {
    height: 100%; width: 100%; overflow: hidden; background: #000;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }

  /* Palco fixo 1080x1920, escalado pra caber na tela mantendo proporção */
  #stage {
    position: absolute; top: 50%; left: 50%;
    width: 1080px; height: 1920px;
    transform-origin: center center;
    overflow: hidden;
  }
  .layer { position: absolute; left: 0; top: 0; width: 1080px; height: 1920px; pointer-events: none; }

  /* Roleta gira em torno do centro real do disco */
  #wheel { transform-origin: 533px 848px; will-change: transform; }

  /* Botão GIRAR (área clicável transparente sobre a arte do botão) */
  #spinHit {
    position: absolute; left: 166px; top: 1543px; width: 749px; height: 212px;
    background: transparent; border: none; cursor: pointer; z-index: 30;
  }
  #botao.press { filter: brightness(1.15); transform: scale(.97); transform-origin: 540px 1649px; }
  #spinHit:disabled { cursor: default; }

  /* Botão Probabilidade (lado direito, abaixo das logos) */
  #probBtn {
    position: absolute; top: 372px; right: 36px; z-index: 30;
    display: flex; align-items: center; gap: 12px;
    background: rgba(0,0,0,.40); border: 2px solid rgba(255,255,255,.35);
    color: #fff; border-radius: 999px; padding: 16px 28px;
    font-size: 30px; font-weight: 600; cursor: pointer; backdrop-filter: blur(4px);
  }
  #probBtn .iicon {
    width: 40px; height: 40px; border-radius: 50%;
    background: #ffcb05; color: #0b1026; font: italic 800 28px Georgia, serif;
    display: flex; align-items: center; justify-content: center;
  }

  /* Overlays (dentro do palco, mesma escala) */
  .overlay {
    position: absolute; inset: 0; z-index: 60; display: none;
    align-items: center; justify-content: center;
    background: rgba(4,7,20,.74); padding: 80px;
  }
  .overlay.show { display: flex; }

  /* Popup de probabilidades: pequeno, ancorado no canto direito sob o botão */
  #probOverlay { background: rgba(4,7,20,.20); }
  .prob-box {
    position: absolute; top: 470px; right: 36px; width: 430px;
    background: #fff; color: #1a1f3c; border-radius: 20px;
    padding: 22px 24px; box-shadow: 0 18px 50px rgba(0,0,0,.5); max-height: 1100px; overflow-y: auto;
  }
  .prob-box h2 { text-align: center; font-size: 28px; margin-bottom: 14px; }
  .prob-list { list-style: none; }
  .prob-list li {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 8px 0; font-size: 20px; border-bottom: 1px solid #eef0f7;
  }
  .prob-list li:last-child { border-bottom: none; }
  .prob-list .nm { display: flex; align-items: center; gap: 12px; font-weight: 600; }
  .prob-list .dot { width: 16px; height: 16px; border-radius: 50%; flex: none; }
  .prob-list .pct { font-weight: 800; color: #555; white-space: nowrap; }
  .closebar { text-align: center; margin-top: 16px; }
  .btn-close {
    background: #0b1026; color: #fff; border: none; border-radius: 999px;
    padding: 12px 44px; font-size: 22px; font-weight: 700; cursor: pointer;
  }
  /* Tela de resultado = imagem cheia (Você ganhou / Não foi / Gire novamente) */
  #resultOverlay { background: rgba(4,7,20,.55); }
  #resultProd {
    position: absolute; left: 736px; top: 736px; width: 184px; height: 184px;
    object-fit: contain; transform-origin: center center; display: none;
    animation: rock 0.8s ease-in-out infinite; pointer-events: none;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,.35));
  }
  @keyframes rock {
    0%   { transform: rotate(-23deg); }
    50%  { transform: rotate(23deg); }
    100% { transform: rotate(-23deg); }
  }
</style>
</head>
<body>
<div id="stage">
  <img class="layer" id="fundo"    src="assets/fundo.gif"    alt="" />
  <img class="layer" id="marcas"   src="assets/marcas.png"   alt="" />
  <img class="layer" id="wheel"    src="assets/roleta.png"   alt="" />
  <img class="layer" id="ponteiro" src="assets/ponteiro.png" alt="" />
  <img class="layer" id="botao"    src="assets/botao.png"    alt="" />
  <img class="layer" id="instagram" src="assets/instagram.png" alt="@alfadistribuidorabrasil" />

  <button id="spinHit" aria-label="Girar"></button>

  <button id="probBtn" aria-label="Ver probabilidades">
    <span>Probabilidade</span><span class="iicon">i</span>
  </button>

  <!-- Caixa de probabilidades -->
  <div class="overlay" id="probOverlay">
    <div class="prob-box">
      <h2>Probabilidades</h2>
      <ul class="prob-list" id="probList"></ul>
      <div class="closebar"><button class="btn-close" data-close>Fechar</button></div>
    </div>
  </div>

  <!-- Resultado (imagem cheia + produto à direita do texto) -->
  <div class="overlay" id="resultOverlay">
    <img class="layer" id="resultBg" src="" alt="" />
    <img id="resultProd" src="" alt="" />
  </div>
</div>

<script>
/* ============================================================
   PRÊMIOS  —  peso = porcentagem (soma = 100)
   img = arquivo em img/  (null = sem imagem, ex.: "Não foi dessa vez")
   ============================================================ */
/* ang = ângulo da fatia na arte (graus, horário a partir do topo).
   A roleta tem 12 fatias de 30°. Os pesos somam 100. */
const PREMIOS = [
  { nome: "Space Black 5L",          peso: 0.1,  ang: 330, cor: "#e63946", img: "pretinho5l.png" },
  { nome: "Better Shine",            peso: 0.1,  ang: 90,  cor: "#f3722c", img: "shine.png" },
  { nome: "Air Pro",                 peso: 0.1,  ang: 270, cor: "#f9844a", img: "airpro.png" },
  { nome: "Space Black 2L",          peso: 1,    ang: 30,  cor: "#f9c74f", img: "pretinho2l.png" },
  { nome: "Boné ALFA",               peso: 8,    ang: 150, cor: "#90be6d", img: "bone.png" },
  { nome: "Copo ALFA",               peso: 8,    ang: 210, cor: "#43aa8b", img: "copo.png" },
  { nome: "Pincel",                  peso: 10,   ang: 300, cor: "#4d908e", img: "pincel.png" },
  { nome: "Luva Microfibra",         peso: 10,   ang: 240, cor: "#577590", img: "luva.png" },
  { nome: "Pano Microfibra",         peso: 25,   ang: 60,  cor: "#277da1", img: "pano.png" },
  { nome: "Pano Microfibra 2 Faces", peso: 10,   ang: 120, cor: "#6a4c93", img: "panoduplo.png" },
  { nome: "Não foi dessa vez",       peso: 17,   ang: 180, cor: "#3a3f5c", img: null, perdeu: true },
  { nome: "Gire novamente",          peso: 10.7, ang: 0,   cor: "#888",    img: null, novamente: true },
];

/* ---------- Escala do palco ---------- */
const stage = document.getElementById("stage");
function fit() {
  const s = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
  stage.style.transform = `translate(-50%,-50%) scale(${s})`;
}
window.addEventListener("resize", fit);
fit();

/* ---------- Giro ---------- */
const wheelEl = document.getElementById("wheel");
const botaoEl = document.getElementById("botao");
const spinHit = document.getElementById("spinHit");
let rotation = 0;
let spinning = false;

/* ---------- Sons (arquivos reais em sons/) ---------- */
const sndRoleta = new Audio("sons/roleta.mp3");
sndRoleta.loop = true; sndRoleta.preload = "auto"; sndRoleta.volume = 0.8;
// deixa o tom cair junto com a velocidade ao desacelerar (mais realista)
sndRoleta.preservesPitch = false;
sndRoleta.mozPreservesPitch = false;
sndRoleta.webkitPreservesPitch = false;
const sndGanhou = new Audio("sons/ganhou.mp3"); sndGanhou.preload = "auto"; sndGanhou.volume = 0.9;
const sndNaoFoi = new Audio("sons/naofoi.mp3"); sndNaoFoi.preload = "auto"; sndNaoFoi.volume = 0.9;
const sndNovamente = new Audio("sons/novamente.mp3"); sndNovamente.preload = "auto"; sndNovamente.volume = 0.9;

/* Música tema (loop) com "ducking": abaixa no giro e nos outros sons */
const sndTema = new Audio("sons/tema.mp3");
sndTema.loop = true; sndTema.preload = "auto"; sndTema.volume = 0.25;
sndTema.setAttribute("playsinline", "");
const TEMA_CHEIO = 0.25, TEMA_BAIXO = 0.07;
let temaIniciado = false, fadeTemaId = null;
function startTema() {
  ensureGraph();
  if (temaIniciado) return;
  temaIniciado = true;
  sndTema.volume = TEMA_CHEIO;
  sndTema.play().catch(() => { temaIniciado = false; });
}
function fadeTema(alvo, ms) {
  if (fadeTemaId) clearInterval(fadeTemaId);
  const v0 = sndTema.volume, passos = Math.max(1, Math.round(ms / 30));
  let k = 0;
  fadeTemaId = setInterval(() => {
    k++;
    sndTema.volume = Math.max(0, Math.min(1, v0 + (alvo - v0) * k / passos));
    if (k >= passos) { clearInterval(fadeTemaId); fadeTemaId = null; }
  }, 30);
}
function abaixarTema() { if (temaIniciado) fadeTema(TEMA_BAIXO, 250); }
function restaurarTema() { if (temaIniciado) fadeTema(TEMA_CHEIO, 600); }

/* Amplificação via Web Audio: GainNode passa de 1.0, deixando os sons
   muito mais altos (todos os volumes do app x BOOST). */
const BOOST = 5;
let actx = null, grafoPronto = false;
function ensureGraph() {
  if (actx) { if (actx.state === "suspended") actx.resume(); return; }
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;                       // sem Web Audio: usa o volume normal
  actx = new AC();
  if (!grafoPronto) {
    grafoPronto = true;
    [sndRoleta, sndGanhou, sndNaoFoi, sndNovamente, sndTema].forEach(a => {
      try {
        const src = actx.createMediaElementSource(a);
        const g = actx.createGain();
        g.gain.value = BOOST;
        src.connect(g); g.connect(actx.destination);
      } catch (e) {}
    });
  }
  if (actx.state === "suspended") actx.resume();
}

let audioUnlocked = false;
function unlockAudio() {
  ensureGraph();
  if (audioUnlocked) return;
  audioUnlocked = true;
  [sndGanhou, sndNaoFoi, sndNovamente].forEach(a => {
    a.muted = true;
    const p = a.play();
    if (p) p.then(() => { a.pause(); a.currentTime = 0; a.muted = false; })
           .catch(() => { a.muted = false; });
  });
}
// quando um som de resultado termina, a música volta ao volume cheio
[sndGanhou, sndNaoFoi, sndNovamente].forEach(a =>
  a.addEventListener("ended", restaurarTema));
// inicia a música no primeiro toque do usuário (exigência dos navegadores).
// tenta em vários tipos de evento e só remove os listeners quando conseguir tocar.
function iniciarAudioGesto() {
  startTema();
  if (temaIniciado) {
    ["pointerdown", "touchend", "click"].forEach(ev =>
      window.removeEventListener(ev, iniciarAudioGesto));
  }
}
["pointerdown", "touchend", "click"].forEach(ev =>
  window.addEventListener(ev, iniciarAudioGesto));
function pararRoletaSom() {
  // corte rápido (~36ms) pra o som não arrastar depois da roleta parar
  const v0 = sndRoleta.volume;
  let k = 0;
  const id = setInterval(() => {
    k++;
    sndRoleta.volume = Math.max(0, v0 * (1 - k / 3));
    if (k >= 3) { clearInterval(id); sndRoleta.pause(); sndRoleta.currentTime = 0; sndRoleta.volume = v0; }
  }, 12);
}

// Tique sincronizado do giro (Web Audio): um clique curto a cada fatia que
// cruza o ponteiro. A cadência segue a roda — rápida no início e freando junto
// com ela no fim, sem loop nem descompasso.
const TICK_VOL = 27.0;                  // volume do tique (ajuste fino aqui)
const TICK_FREQ = 1800;                 // timbre do "tec" (Hz) — grave/agudo
// buffer de ruído curto, reutilizado em cada tique
let tickNoise = null;
function getTickNoise() {
  if (tickNoise || !actx) return tickNoise;
  const len = Math.floor(actx.sampleRate * 0.05);
  tickNoise = actx.createBuffer(1, len, actx.sampleRate);
  const d = tickNoise.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return tickNoise;
}
function tickSom() {
  if (!actx) return;
  const now = actx.currentTime;
  const src = actx.createBufferSource();
  src.buffer = getTickNoise();
  // band-pass dá o "tec" mecânico/woody parecido com a catraca da roleta real
  const bp = actx.createBiquadFilter();
  bp.type = "bandpass";
  bp.frequency.value = TICK_FREQ;
  bp.Q.value = 7;
  const g = actx.createGain();
  g.gain.setValueAtTime(TICK_VOL, now);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.04); // decaimento bem curto
  src.connect(bp); bp.connect(g); g.connect(actx.destination);
  src.start(now);
  src.stop(now + 0.05);
}

function sortear() {
  const total = PREMIOS.reduce((s, p) => s + p.peso, 0);
  let r = Math.random() * total;
  for (let i = 0; i < PREMIOS.length; i++) {
    r -= PREMIOS[i].peso;
    if (r < 0) return i;
  }
  return PREMIOS.length - 1;
}

function girar() {
  if (spinning) return;
  spinning = true;
  spinHit.disabled = true;
  unlockAudio();                               // libera o áudio no toque do usuário
  startTema();                                 // garante a música tocando
  abaixarTema();                               // abaixa a música durante o giro
  sndGanhou.pause(); sndNaoFoi.pause(); sndNovamente.pause();
  // o som do giro agora é gerado: um tique por fatia que passa (ver tickSom())

  const idx = sortear();                       // decide o prêmio (por %)
  // para o ponteiro (topo, 0°) bem na fatia sorteada:
  const ang = PREMIOS[idx].ang;
  const voltas = 39 + Math.floor(Math.random() * 5);  // 39 a 43 voltas (giro bem veloz)
  const jitter = (Math.random() - 0.5) * 22;   // ±11° dentro da fatia (fatia = 30°)
  const base = Math.ceil(rotation / 360) * 360;
  const alvo = base + voltas * 360 + ((360 - ang) % 360) + jitter;
  const inicio = rotation;
  const delta = alvo - inicio;
  const dur = 27000;                            // gira por 27 segundos
  const t0 = performance.now();
  // Perfil de velocidade em 3 fases graduais (sem saltos de velocidade),
  // proporcional ao tempo total (~37% pico, ~25% cruzeiro, ~38% freada):
  //  fase 1 (~0–10s) : pico de velocidade caindo suavemente até a de cruzeiro
  //  fase 2 (~10–17s): velocidade de cruzeiro constante
  //  fase 3 (~17–27s): desaceleração suave até parar
  const tA = 15 / 40;                           // fim da fase de pico (proporção)
  const tB = 25 / 40;                           // fim da fase de cruzeiro (proporção)
  const VHIGH = 2.6;                            // pico inicial (x da velocidade de cruzeiro)
  const PI = Math.PI, spanA = tA, spanC = 1 - tB;
  const dA = 0.5 * (1 + VHIGH) * spanA;         // área (distância) da fase de pico
  const dB = tB - tA;                           // área da fase de cruzeiro
  const dC = 0.5 * spanC;                       // área da freada
  const DTOT = dA + dB + dC;
  const ease = t => {
    let d;
    if (t <= tA) {                              // pico -> cruzeiro (cosseno suave)
      d = t + (VHIGH - 1) * 0.5 * (t + (spanA / PI) * Math.sin(PI * t / spanA));
    } else if (t <= tB) {                       // cruzeiro (velocidade constante)
      d = dA + (t - tA);
    } else {                                    // cruzeiro -> parada (cosseno suave)
      const w = t - tB;
      d = dA + dB + 0.5 * (w + (spanC / PI) * Math.sin(PI * w / spanC));
    }
    return d / DTOT;
  };
  // tique do giro: um clique a cada fatia que cruza o ponteiro. A cadência
  // segue a roda sozinha (rápida nos 25s, freando junto no fim).
  const SLICE = 360 / PREMIOS.length;           // 30° por fatia
  let lastSlice = Math.floor(rotation / SLICE);

  (function frame(now) {
    const t = Math.min(1, (now - t0) / dur);
    rotation = inicio + delta * ease(t);
    wheelEl.style.transform = `rotate(${rotation}deg)`;
    // dispara um tique a cada fatia ultrapassada
    const slice = Math.floor(rotation / SLICE);
    if (slice !== lastSlice) { tickSom(); lastSlice = slice; }
    if (t < 1) requestAnimationFrame(frame);
    else {
      rotation %= 360;
      spinning = false;
      spinHit.disabled = false;
      const p = PREMIOS[idx];
      if (p.novamente)    { sndNovamente.currentTime = 0; sndNovamente.play().catch(() => {}); }
      else if (p.perdeu)  { sndNaoFoi.currentTime = 0;   sndNaoFoi.play().catch(() => {}); }
      else                { sndGanhou.currentTime = 0;   sndGanhou.play().catch(() => {}); }
      mostrarResultado(idx);
    }
  })(performance.now());
}

/* ---------- Resultado ---------- */
function mostrarResultado(idx) {
  const p = PREMIOS[idx];
  const bg = document.getElementById("resultBg");
  const prod = document.getElementById("resultProd");
  if (p.novamente) {
    bg.src = "assets/resultado/novamente.png";
    prod.style.display = "none";
  } else if (p.perdeu) {
    bg.src = "assets/resultado/naofoi.png";
    prod.style.display = "none";
  } else {
    bg.src = "assets/resultado/ganhou.png";
    prod.src = "img/" + p.img;
    prod.style.display = "block";
  }
  document.getElementById("resultOverlay").classList.add("show");
}

/* ---------- Lista de probabilidades ---------- */
function montarLista() {
  const ul = document.getElementById("probList");
  ul.innerHTML = "";
  [...PREMIOS].sort((a, b) => b.peso - a.peso).forEach(p => {
    const li = document.createElement("li");
    const pct = String(p.peso).replace(".", ",");
    li.innerHTML = `<span class="nm"><span class="dot" style="background:${p.cor}"></span>${p.nome}</span>`
                 + `<span class="pct">${pct}%</span>`;
    ul.appendChild(li);
  });
}

/* ---------- Eventos ---------- */
spinHit.addEventListener("click", girar);
spinHit.addEventListener("pointerdown", () => botaoEl.classList.add("press"));
["pointerup", "pointerleave", "pointercancel"].forEach(ev =>
  spinHit.addEventListener(ev, () => botaoEl.classList.remove("press")));
document.getElementById("probBtn").addEventListener("click", () =>
  document.getElementById("probOverlay").classList.add("show"));
document.querySelectorAll("[data-close]").forEach(b =>
  b.addEventListener("click", () => b.closest(".overlay").classList.remove("show")));
document.querySelectorAll(".overlay").forEach(o =>
  o.addEventListener("click", e => { if (e.target === o) o.classList.remove("show"); }));
// tela de resultado fecha tocando em qualquer lugar
document.getElementById("resultOverlay").addEventListener("click", () => {
  document.getElementById("resultOverlay").classList.remove("show");
  [sndGanhou, sndNaoFoi, sndNovamente].forEach(a => a.pause());
  restaurarTema();
});

/* ---------- Tela acesa ---------- */
(async () => {
  try {
    if ("wakeLock" in navigator) {
      let lock = await navigator.wakeLock.request("screen");
      document.addEventListener("visibilitychange", async () => {
        if (document.visibilityState === "visible")
          try { lock = await navigator.wakeLock.request("screen"); } catch (e) {}
      });
    }
  } catch (e) {}
})();

/* ---------- Service Worker ---------- */
if ("serviceWorker" in navigator)
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));

montarLista();
</script>
</body>
</html>
