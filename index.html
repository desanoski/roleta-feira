<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b1026" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<title>Roleta Alfa</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body {
    height: 100%; width: 100%; overflow: hidden; background: #000;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }

  /* Palco fixo 1080x1920, escalado pra caber na tela mantendo proporção */
  #stage {
    position: absolute; top: 50%; left: 50%;
    width: 1080px; height: 1920px;
    transform-origin: center center;
    overflow: hidden;
  }
  .layer { position: absolute; left: 0; top: 0; width: 1080px; height: 1920px; pointer-events: none; }

  /* Roleta gira em torno do centro real do disco */
  #wheel { transform-origin: 533px 848px; will-change: transform; }

  /* Botão GIRAR (área clicável transparente sobre a arte do botão) */
  #spinHit {
    position: absolute; left: 153px; top: 1610px; width: 753px; height: 215px;
    background: transparent; border: none; cursor: pointer; z-index: 30;
  }
  #botao.press { filter: brightness(1.15); transform: scale(.97); transform-origin: 531px 1717px; }
  #spinHit:disabled { cursor: default; }

  /* Botão Probabilidade (lado direito, abaixo das logos) */
  #probBtn {
    position: absolute; top: 372px; right: 36px; z-index: 30;
    display: flex; align-items: center; gap: 12px;
    background: rgba(0,0,0,.40); border: 2px solid rgba(255,255,255,.35);
    color: #fff; border-radius: 999px; padding: 16px 28px;
    font-size: 30px; font-weight: 600; cursor: pointer; backdrop-filter: blur(4px);
  }
  #probBtn .iicon {
    width: 40px; height: 40px; border-radius: 50%;
    background: #ffcb05; color: #0b1026; font: italic 800 28px Georgia, serif;
    display: flex; align-items: center; justify-content: center;
  }

  /* Overlays (dentro do palco, mesma escala) */
  .overlay {
    position: absolute; inset: 0; z-index: 60; display: none;
    align-items: center; justify-content: center;
    background: rgba(4,7,20,.74); padding: 80px;
  }
  .overlay.show { display: flex; }

  /* Popup de probabilidades: pequeno, ancorado no canto direito sob o botão */
  #probOverlay { background: rgba(4,7,20,.20); }
  .prob-box {
    position: absolute; top: 470px; right: 36px; width: 430px;
    background: #fff; color: #1a1f3c; border-radius: 20px;
    padding: 22px 24px; box-shadow: 0 18px 50px rgba(0,0,0,.5); max-height: 1100px; overflow-y: auto;
  }
  .prob-box h2 { text-align: center; font-size: 28px; margin-bottom: 14px; }
  .prob-list { list-style: none; }
  .prob-list li {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 8px 0; font-size: 20px; border-bottom: 1px solid #eef0f7;
  }
  .prob-list li:last-child { border-bottom: none; }
  .prob-list .nm { display: flex; align-items: center; gap: 12px; font-weight: 600; }
  .prob-list .dot { width: 16px; height: 16px; border-radius: 50%; flex: none; }
  .prob-list .pct { font-weight: 800; color: #555; white-space: nowrap; }
  .closebar { text-align: center; margin-top: 16px; }
  .btn-close {
    background: #0b1026; color: #fff; border: none; border-radius: 999px;
    padding: 12px 44px; font-size: 22px; font-weight: 700; cursor: pointer;
  }
  /* o resultado mantém botão grande e centralizado */
  .result-card .btn-close { padding: 18px 70px; font-size: 32px; }

  .result-card {
    width: 760px; text-align: center; background: linear-gradient(180deg,#fff,#eef0ff);
    color: #1a1f3c; border-radius: 32px; padding: 56px 48px; box-shadow: 0 30px 80px rgba(0,0,0,.6);
  }
  .result-card .kicker { font-size: 40px; font-weight: 700; opacity: .7; }
  .result-card .pimg { width: 360px; height: 360px; object-fit: contain; margin: 14px auto; display: none; }
  .result-card .prize { margin: 8px 0 4px; font-size: 72px; font-weight: 900; color: #e10600; line-height: 1.05; }
  .result-card.miss .prize { color: #5a6080; font-size: 60px; }
  .result-card .emoji { font-size: 150px; line-height: 1; display: none; }
  .result-card .btn-close { background: #e10600; margin-top: 22px; }
</style>
</head>
<body>
<div id="stage">
  <img class="layer" id="fundo"    src="assets/fundo.gif"    alt="" />
  <img class="layer" id="marcas"   src="assets/marcas.png"   alt="" />
  <img class="layer" id="wheel"    src="assets/roleta.png"   alt="" />
  <img class="layer" id="ponteiro" src="assets/ponteiro.png" alt="" />
  <img class="layer" id="botao"    src="assets/botao.png"    alt="" />

  <button id="spinHit" aria-label="Girar"></button>

  <button id="probBtn" aria-label="Ver probabilidades">
    <span>Probabilidade</span><span class="iicon">i</span>
  </button>

  <!-- Caixa de probabilidades -->
  <div class="overlay" id="probOverlay">
    <div class="prob-box">
      <h2>Probabilidades</h2>
      <ul class="prob-list" id="probList"></ul>
      <div class="closebar"><button class="btn-close" data-close>Fechar</button></div>
    </div>
  </div>

  <!-- Resultado -->
  <div class="overlay" id="resultOverlay">
    <div class="result-card" id="resultCard">
      <div class="emoji" id="resEmoji">🙁</div>
      <img class="pimg" id="resImg" src="" alt="" />
      <div class="kicker" id="resKicker">Você ganhou</div>
      <div class="prize" id="resPrize">—</div>
      <div class="closebar"><button class="btn-close" data-close>Continuar</button></div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   PRÊMIOS  —  peso = porcentagem (soma = 100)
   img = arquivo em img/  (null = sem imagem, ex.: "Não foi dessa vez")
   ============================================================ */
/* ang = ângulo da fatia na arte (graus, horário a partir do topo).
   A roleta tem 12 fatias de 30°. Os pesos somam 100. */
const PREMIOS = [
  { nome: "Pretinho 5L",       peso: 0.1,  ang: 330, cor: "#e63946", img: "pretinho5l.png" },
  { nome: "Shine",             peso: 0.1,  ang: 90,  cor: "#f3722c", img: "shine.png" },
  { nome: "Air Pro",           peso: 0.1,  ang: 270, cor: "#f9844a", img: "airpro.png" },
  { nome: "Pretinho 2L",       peso: 1,    ang: 30,  cor: "#f9c74f", img: "pretinho2l.png" },
  { nome: "Boné",              peso: 10,   ang: 150, cor: "#90be6d", img: "bone.png" },
  { nome: "Copo",              peso: 8,    ang: 210, cor: "#43aa8b", img: "copo.png" },
  { nome: "Pincel",            peso: 10,   ang: 300, cor: "#4d908e", img: "pincel.png" },
  { nome: "Luva",              peso: 10,   ang: 240, cor: "#577590", img: "luva.png" },
  { nome: "Pano",              peso: 25,   ang: 60,  cor: "#277da1", img: "pano.png" },
  { nome: "Pano Duplo",        peso: 10,   ang: 120, cor: "#6a4c93", img: "panoduplo.png" },
  { nome: "Não foi dessa vez", peso: 15,   ang: 180, cor: "#3a3f5c", img: null, perdeu: true },
  { nome: "Gire novamente",    peso: 10.7, ang: 0,   cor: "#888",    img: null, novamente: true },
];

/* ---------- Escala do palco ---------- */
const stage = document.getElementById("stage");
function fit() {
  const s = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
  stage.style.transform = `translate(-50%,-50%) scale(${s})`;
}
window.addEventListener("resize", fit);
fit();

/* ---------- Giro ---------- */
const wheelEl = document.getElementById("wheel");
const botaoEl = document.getElementById("botao");
const spinHit = document.getElementById("spinHit");
let rotation = 0;
let spinning = false;

/* ---------- Som do giro (tic-tic sintetizado, sem arquivo) ---------- */
const TICK_STEP = 15;          // toca um "tic" a cada 15° (24 pinos por volta)
let actx = null;
let lastTick = 0;
function initAudio() {
  if (!actx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) actx = new AC();
  }
  if (actx && actx.state === "suspended") actx.resume();
}
function playTick(velPorFrame) {
  if (!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = "square";
  // quanto mais rápida a roleta, mais agudo o tic
  o.frequency.value = 760 + Math.min(700, Math.abs(velPorFrame) * 22);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.28, t + 0.002);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
  o.connect(g).connect(actx.destination);
  o.start(t);
  o.stop(t + 0.06);
}

function sortear() {
  const total = PREMIOS.reduce((s, p) => s + p.peso, 0);
  let r = Math.random() * total;
  for (let i = 0; i < PREMIOS.length; i++) {
    r -= PREMIOS[i].peso;
    if (r < 0) return i;
  }
  return PREMIOS.length - 1;
}

function girar() {
  if (spinning) return;
  spinning = true;
  spinHit.disabled = true;
  initAudio();                                 // libera o áudio no toque do usuário

  const idx = sortear();                       // decide o prêmio (por %)
  // para o ponteiro (topo, 0°) bem na fatia sorteada:
  const ang = PREMIOS[idx].ang;
  const voltas = 8 + Math.floor(Math.random() * 3);   // 8 a 10 voltas
  const jitter = (Math.random() - 0.5) * 22;   // ±11° dentro da fatia (fatia = 30°)
  const base = Math.ceil(rotation / 360) * 360;
  const alvo = base + voltas * 360 + ((360 - ang) % 360) + jitter;
  const inicio = rotation;
  const delta = alvo - inicio;
  const dur = 8200;                             // mais tempo girando
  const t0 = performance.now();
  const ease = t => 1 - Math.pow(1 - t, 5);     // desacelera bem devagar no fim (tensão)
  lastTick = Math.floor(inicio / TICK_STEP);

  (function frame(now) {
    const t = Math.min(1, (now - t0) / dur);
    const anterior = rotation;
    rotation = inicio + delta * ease(t);
    wheelEl.style.transform = `rotate(${rotation}deg)`;
    // toca um tic a cada pino cruzado (acompanha a velocidade da roleta)
    const idxTick = Math.floor(rotation / TICK_STEP);
    if (idxTick !== lastTick) {
      lastTick = idxTick;
      playTick(rotation - anterior);
    }
    if (t < 1) requestAnimationFrame(frame);
    else {
      rotation %= 360;
      spinning = false;
      spinHit.disabled = false;
      mostrarResultado(idx);
    }
  })(performance.now());
}

/* ---------- Resultado ---------- */
function mostrarResultado(idx) {
  const p = PREMIOS[idx];
  const card = document.getElementById("resultCard");
  const img = document.getElementById("resImg");
  const emoji = document.getElementById("resEmoji");
  if (p.novamente) {
    card.classList.add("miss");
    img.style.display = "none";
    emoji.style.display = "block";
    emoji.textContent = "🔄";
    document.getElementById("resKicker").textContent = "Boa!";
    document.getElementById("resPrize").textContent = "Gire novamente";
  } else if (p.perdeu) {
    card.classList.add("miss");
    img.style.display = "none";
    emoji.style.display = "block";
    emoji.textContent = "🙁";
    document.getElementById("resKicker").textContent = "Que pena!";
    document.getElementById("resPrize").textContent = "Não foi dessa vez";
  } else {
    card.classList.remove("miss");
    emoji.style.display = "none";
    img.src = "img/" + p.img;
    img.style.display = "block";
    document.getElementById("resKicker").textContent = "Você ganhou";
    document.getElementById("resPrize").textContent = p.nome;
  }
  document.getElementById("resultOverlay").classList.add("show");
}

/* ---------- Lista de probabilidades ---------- */
function montarLista() {
  const ul = document.getElementById("probList");
  ul.innerHTML = "";
  PREMIOS.forEach(p => {
    const li = document.createElement("li");
    const pct = String(p.peso).replace(".", ",");
    li.innerHTML = `<span class="nm"><span class="dot" style="background:${p.cor}"></span>${p.nome}</span>`
                 + `<span class="pct">${pct}%</span>`;
    ul.appendChild(li);
  });
}

/* ---------- Eventos ---------- */
spinHit.addEventListener("click", girar);
spinHit.addEventListener("pointerdown", () => botaoEl.classList.add("press"));
["pointerup", "pointerleave", "pointercancel"].forEach(ev =>
  spinHit.addEventListener(ev, () => botaoEl.classList.remove("press")));
document.getElementById("probBtn").addEventListener("click", () =>
  document.getElementById("probOverlay").classList.add("show"));
document.querySelectorAll("[data-close]").forEach(b =>
  b.addEventListener("click", () => b.closest(".overlay").classList.remove("show")));
document.querySelectorAll(".overlay").forEach(o =>
  o.addEventListener("click", e => { if (e.target === o) o.classList.remove("show"); }));

/* ---------- Tela acesa ---------- */
(async () => {
  try {
    if ("wakeLock" in navigator) {
      let lock = await navigator.wakeLock.request("screen");
      document.addEventListener("visibilitychange", async () => {
        if (document.visibilityState === "visible")
          try { lock = await navigator.wakeLock.request("screen"); } catch (e) {}
      });
    }
  } catch (e) {}
})();

/* ---------- Service Worker ---------- */
if ("serviceWorker" in navigator)
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));

montarLista();
</script>
</body>
</html>
